name: Docker Monorepo Build (ARM64)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_all:
        description: Force full rebuild regardless of changed paths
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_PREFIX: josnelihurt-code/learning-cuda

concurrency:
  group: docker-monorepo-arm64-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

# Smart CI: build/push steps only run when paths relevant to cpp-accelerator change.
# Force a full rebuild with either:
#   - PR label: ci:full-build
#   - workflow_dispatch (manual runs always force a full rebuild)
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ["self-hosted", "Linux", "ARM64"]
    outputs:
      cpp_accelerator: ${{ steps.decide.outputs.cpp_accelerator }}
      yolo_model: ${{ steps.decide.outputs.yolo_model }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cpp_accelerator:
              - 'proto/**'
              - 'src/cpp_accelerator/**'
              - 'bazel/**'
              - 'third_party/**'
              - 'MODULE.bazel'
              - 'WORKSPACE.bazel'
              - '.bazelrc'
              - '.bazelversion'
              - 'buf.yaml'
              - 'buf.lock'
              - 'buf.gen.yaml'
              - 'buf.gen.backend.yaml'
              - 'scripts/docker/build-local.sh'
              - 'scripts/docker/push-tagged-images.sh'
              - '.github/workflows/docker-monorepo-build-arm.yml'
            yolo_model:
              - 'src/cpp_accelerator/yolo-model-gen/**'
              - 'scripts/models/export_yolo_to_onnx.py'

      - name: Decide build scope
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_ALL: ${{ inputs.force_all }}
          LABEL_FORCE: ${{ contains(github.event.pull_request.labels.*.name, 'ci:full-build') }}
          FILTER_CPP_ACCELERATOR: ${{ steps.filter.outputs.cpp_accelerator }}
          FILTER_YOLO_MODEL: ${{ steps.filter.outputs.yolo_model }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] \
             || [ "${FORCE_ALL}" = "true" ] \
             || [ "${LABEL_FORCE}" = "true" ]; then
            echo "cpp_accelerator=true" >> "$GITHUB_OUTPUT"
            echo "yolo_model=true" >> "$GITHUB_OUTPUT"
          else
            echo "cpp_accelerator=${FILTER_CPP_ACCELERATOR:-false}" >> "$GITHUB_OUTPUT"
            echo "yolo_model=${FILTER_YOLO_MODEL:-false}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build all images (PRs only)
    if: github.event_name == 'pull_request'
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "ARM64", "dev"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build yolo-model-gen image locally (PR)
        if: needs.detect-changes.outputs.yolo_model == 'true' || needs.detect-changes.outputs.cpp_accelerator == 'true'
        env:
          REGISTRY: ghcr.io
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
        run: |
          chmod +x scripts/docker/build-local.sh

          # Get the amd64 yolo-model-gen version from x86
          YOLO_VERSION=$(cat src/cpp_accelerator/yolo-model-gen/VERSION)
          AMD64_IMAGE="${REGISTRY}/${BASE_IMAGE_PREFIX}/yolo-model-gen:${YOLO_VERSION}-amd64"

          echo "Extracting ONNX model from x86 image: ${AMD64_IMAGE}"
          # Pull x86 image and extract .onnx using docker cp (works with scratch images)
          docker pull "${AMD64_IMAGE}"
          docker cp "${AMD64_IMAGE}:/models/yolov10n.onnx" /tmp/yolov10n.onnx

          # Build ARM64 yolo-model-gen artifact using the new artifact_from_prebuilt stage
          docker build \
            --platform linux/arm64 \
            --build-arg "ONNX_FILE=/tmp/yolov10n.onnx" \
            --target artifact_from_prebuilt \
            -f src/cpp_accelerator/yolo-model-gen/Dockerfile \
            -t local/${BASE_IMAGE_PREFIX}/yolo-model-gen:${YOLO_VERSION}-arm64 \
            -t local/${BASE_IMAGE_PREFIX}/yolo-model-gen:latest-arm64 \
            .

          echo "Built ARM64 yolo-model-gen artifact using x86 ONNX model"

      - name: Build cpp-accelerator image locally
        if: needs.detect-changes.outputs.cpp_accelerator == 'true'
        env:
          REGISTRY: local
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
        run: |
          chmod +x scripts/docker/build-local.sh
          # Jetson deployment only consumes cpp-accelerator. Skip go/app/web-frontend/runtime-base
          # to cut ARM64 build time. Stages kept satisfy Dockerfile.build dependencies plus the
          # cpp-built guard in build-local.sh::run_cpp_accelerator_image.
          # Note: yolo-model-gen must be built first (above) as cpp-accelerator now depends on it.
          ./scripts/docker/build-local.sh \
            --stage proto-tools \
            --stage bazel-base \
            --stage proto \
            --stage cpp \
            --stage cpp-accelerator

      - name: No relevant changes
        if: needs.detect-changes.outputs.cpp_accelerator != 'true' && needs.detect-changes.outputs.yolo_model != 'true'
        run: echo "No paths relevant to cpp-accelerator or yolo-model changed; skipping ARM build."

  build_and_push:
    name: Build and push all images
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "ARM64", "dev"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: needs.detect-changes.outputs.cpp_accelerator == 'true' || needs.detect-changes.outputs.yolo_model == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push yolo-model-gen image (ARM64)
        if: needs.detect-changes.outputs.yolo_model == 'true' || needs.detect-changes.outputs.cpp_accelerator == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
        run: |
          chmod +x scripts/docker/build-local.sh

          # Get the amd64 yolo-model-gen version from x86
          YOLO_VERSION=$(cat src/cpp_accelerator/yolo-model-gen/VERSION)
          AMD64_IMAGE="${REGISTRY}/${BASE_IMAGE_PREFIX}/yolo-model-gen:${YOLO_VERSION}-amd64"

          echo "Extracting ONNX model from x86 image: ${AMD64_IMAGE}"
          # Pull x86 image and extract .onnx using docker cp (works with scratch images)
          docker pull "${AMD64_IMAGE}"
          docker cp "${AMD64_IMAGE}:/models/yolov10n.onnx" /tmp/yolov10n.onnx

          # Build ARM64 yolo-model-gen artifact using the new artifact_from_prebuilt stage
          docker build \
            --platform linux/arm64 \
            --build-arg "ONNX_FILE=/tmp/yolov10n.onnx" \
            --target artifact_from_prebuilt \
            -f src/cpp_accelerator/yolo-model-gen/Dockerfile \
            -t ${REGISTRY}/${BASE_IMAGE_PREFIX}/yolo-model-gen:${YOLO_VERSION}-arm64 \
            -t ${REGISTRY}/${BASE_IMAGE_PREFIX}/yolo-model-gen:latest-arm64 \
            .

      - name: Push yolo-model-gen image (ARM64)
        if: needs.detect-changes.outputs.yolo_model == 'true' || needs.detect-changes.outputs.cpp_accelerator == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
        run: |
          YOLO_VERSION=$(cat src/cpp_accelerator/yolo-model-gen/VERSION)
          docker push ${REGISTRY}/${BASE_IMAGE_PREFIX}/yolo-model-gen:${YOLO_VERSION}-arm64
          docker push ${REGISTRY}/${BASE_IMAGE_PREFIX}/yolo-model-gen:latest-arm64

      - name: Build cpp-accelerator image
        if: needs.detect-changes.outputs.cpp_accelerator == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
        run: |
          chmod +x scripts/docker/build-local.sh
          # Note: yolo-model-gen is built in the previous step as cpp-accelerator depends on it.
          ./scripts/docker/build-local.sh \
            --stage proto-tools \
            --stage bazel-base \
            --stage proto \
            --stage cpp \
            --stage cpp-accelerator

      - name: Push cpp-accelerator image
        if: needs.detect-changes.outputs.cpp_accelerator == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
          LATEST_ALIASES: cpp-accelerator
        run: |
          chmod +x scripts/docker/push-tagged-images.sh
          ./scripts/docker/push-tagged-images.sh

      - name: No relevant changes
        if: needs.detect-changes.outputs.cpp_accelerator != 'true' && needs.detect-changes.outputs.yolo_model != 'true'
        run: echo "No paths relevant to cpp-accelerator or yolo-model changed; skipping ARM build and push."

  deploy_prod:
    name: Deploy production (Jetson Nano)
    needs:
      - build_and_push
    runs-on: ["self-hosted", "Linux", "ARM64", "dev"]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Validate Jetson vars and secrets
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
          JETSON_SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
          ACCELERATOR_CLIENT_CERT: ${{ secrets.ACCELERATOR_CLIENT_CERT }}
          ACCELERATOR_CLIENT_KEY: ${{ secrets.ACCELERATOR_CLIENT_KEY }}
          ACCELERATOR_CA_CERT: ${{ secrets.ACCELERATOR_CA_CERT }}
        run: |
          set -euo pipefail
          missing=()
          for var in JETSON_HOST JETSON_APP_DIRECTORY JETSON_USER \
                     ACCELERATOR_CLIENT_CERT ACCELERATOR_CLIENT_KEY ACCELERATOR_CA_CERT; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Jetson vars/secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
          echo "Jetson deploy target: ${JETSON_USER}@${JETSON_HOST}:${JETSON_APP_DIRECTORY}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          JETSON_SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${JETSON_SSH_KEY}" > ~/.ssh/jetson_key
          chmod 600 ~/.ssh/jetson_key

      - name: Add Jetson host to known_hosts
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          tmp_keys="$(mktemp)"
          ssh-keyscan -H "${JETSON_HOST}" > "${tmp_keys}" 2>/dev/null
          while IFS= read -r line; do
            [ -z "${line}" ] && continue
            if ! grep -qxF "${line}" ~/.ssh/known_hosts; then
              printf '%s\n' "${line}" >> ~/.ssh/known_hosts
            fi
          done < "${tmp_keys}"
          rm -f "${tmp_keys}"

      - name: Sync compose file to Jetson
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/jetson_key -o StrictHostKeyChecking=yes"
          REMOTE="${JETSON_USER}@${JETSON_HOST}"

          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p '${JETSON_APP_DIRECTORY}'"

          rsync -az -e "ssh ${SSH_OPTS}" \
            src/cpp_accelerator/docker-compose.yml \
            "${REMOTE}:${JETSON_APP_DIRECTORY}/docker-compose.yml"

      - name: Sync accelerator mTLS secrets to Jetson
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
          ACCELERATOR_CLIENT_CERT: ${{ secrets.ACCELERATOR_CLIENT_CERT }}
          ACCELERATOR_CLIENT_KEY: ${{ secrets.ACCELERATOR_CLIENT_KEY }}
          ACCELERATOR_CA_CERT: ${{ secrets.ACCELERATOR_CA_CERT }}
        run: |
          set -euo pipefail
          for var in ACCELERATOR_CLIENT_CERT ACCELERATOR_CLIENT_KEY ACCELERATOR_CA_CERT; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: ${var}" >&2
              exit 1
            fi
          done

          SSH_OPTS="-i ~/.ssh/jetson_key -o StrictHostKeyChecking=yes"
          REMOTE="${JETSON_USER}@${JETSON_HOST}"

          stage_dir="$(mktemp -d)"
          trap 'rm -rf "${stage_dir}"' EXIT
          umask 077

          printf '%s' "${ACCELERATOR_CLIENT_CERT}" > "${stage_dir}/client.pem"
          printf '%s' "${ACCELERATOR_CLIENT_KEY}"  > "${stage_dir}/client-key.pem"
          printf '%s' "${ACCELERATOR_CA_CERT}"     > "${stage_dir}/ca.pem"
          chmod 600 "${stage_dir}"/*.pem

          ssh ${SSH_OPTS} "${REMOTE}" \
            "mkdir -p '${JETSON_APP_DIRECTORY}/secrets' && chmod 700 '${JETSON_APP_DIRECTORY}/secrets'"

          rsync -az --chmod=F600 -e "ssh ${SSH_OPTS}" \
            "${stage_dir}/client.pem" \
            "${stage_dir}/client-key.pem" \
            "${stage_dir}/ca.pem" \
            "${REMOTE}:${JETSON_APP_DIRECTORY}/secrets/"

      - name: Pull and restart cpp-accelerator on Jetson
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/jetson_key -o StrictHostKeyChecking=yes"
          REMOTE="${JETSON_USER}@${JETSON_HOST}"

          proto_version=$(tr -d '[:space:]' < proto/VERSION)
          cpp_version=$(tr -d '[:space:]' < src/cpp_accelerator/VERSION)
          cpp_accelerator_image="${REGISTRY}/${BASE_IMAGE_PREFIX}/cpp-accelerator:cpp-accelerator-${cpp_version}-proto${proto_version}-arm64"

          echo "Deploying cpp-accelerator image: ${cpp_accelerator_image}"

          ssh ${SSH_OPTS} "${REMOTE}" \
            "JETSON_APP_DIRECTORY='${JETSON_APP_DIRECTORY}' \
             ACCELERATOR_IMAGE='${cpp_accelerator_image}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${JETSON_APP_DIRECTORY}"
          export ACCELERATOR_IMAGE
          export ACCELERATOR_SECRETS_DIR="${JETSON_APP_DIRECTORY}/secrets"
          docker compose pull
          docker compose up -d --remove-orphans

          timeout=60
          while [ "${timeout}" -gt 0 ]; do
            running=$(docker ps --filter 'name=^cuda-accelerator-client$' --filter 'status=running' --format '{{.Names}}')
            if [ "${running}" = "cuda-accelerator-client" ]; then
              echo "accelerator-client is running"
              break
            fi
            sleep 1
            timeout=$((timeout - 1))
          done
          if [ "${timeout}" -eq 0 ]; then
            echo "accelerator-client readiness timeout" >&2
            docker ps --filter 'name=cuda-'
            exit 1
          fi
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/jetson_key
