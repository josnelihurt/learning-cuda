name: Docker Monorepo Build (ARM64)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_PREFIX: josnelihurt-code/learning-cuda

concurrency:
  group: docker-monorepo-arm64-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

# Decision logic lives in scripts/ci/arm-build.sh. detect-changes emits per-stage
# build flags; arm_pr (PR) and build_and_push (merge/dispatch) call the same
# orchestrator with --mode pr and --mode push respectively. cpp-accelerator
# (the runtime image) is built only on merges; on PRs we stop after cpp-builder
# since the runtime stage just COPYs from cpp-builder and validates nothing.
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ["self-hosted", "Linux", "ARM64"]
    outputs:
      cpp_touched: ${{ steps.decide.outputs.cpp_touched }}
      build_proto: ${{ steps.decide.outputs.build_proto }}
      build_bazel_base: ${{ steps.decide.outputs.build_bazel_base }}
      build_cpp_deps: ${{ steps.decide.outputs.build_cpp_deps }}
      build_cuda_runtime: ${{ steps.decide.outputs.build_cuda_runtime }}
      cpp_version_changed: ${{ steps.decide.outputs.cpp_version_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            arm_proto:
              - 'proto/**'
              - 'proto/docker-build-base/**'
              - 'buf.yaml'
              - 'buf.lock'
              - 'buf.gen.yaml'
              - 'buf.gen.backend.yaml'
            arm_bazel_base:
              - 'src/cpp_accelerator/docker-build-base/**'
            arm_cpp_deps:
              - 'src/cpp_accelerator/docker-cpp-dependencies/**'
              - 'bazel/**'
              - 'third_party/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - 'WORKSPACE.bazel'
              - '.bazelrc'
              - '.bazelversion'
            arm_cuda_runtime:
              - 'src/cpp_accelerator/docker-cuda-runtime/**'
            arm_cpp_version:
              - 'src/cpp_accelerator/VERSION'
            arm_cpp_app:
              - 'src/cpp_accelerator/**/*.cpp'
              - 'src/cpp_accelerator/**/*.h'
              - 'src/cpp_accelerator/**/*.cu'
              - 'src/cpp_accelerator/**/*.cuh'
              - 'src/cpp_accelerator/**/BUILD'
              - 'src/cpp_accelerator/**/Dockerfile*'
              - 'src/cpp_accelerator/**/docker-compose.yml'
              - 'src/cpp_accelerator/**/VERSION'
              - 'src/cpp_accelerator/yolo-model-gen/Dockerfile'
              - 'src/cpp_accelerator/yolo-model-gen/VERSION'
              - 'scripts/models/export_yolo_to_onnx.py'

      - name: Decide build scope
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          FILTER_ARM_PROTO: ${{ steps.filter.outputs.arm_proto }}
          FILTER_ARM_BAZEL_BASE: ${{ steps.filter.outputs.arm_bazel_base }}
          FILTER_ARM_CPP_DEPS: ${{ steps.filter.outputs.arm_cpp_deps }}
          FILTER_ARM_CPP_APP: ${{ steps.filter.outputs.arm_cpp_app }}
          FILTER_ARM_CPP_VERSION: ${{ steps.filter.outputs.arm_cpp_version }}
          FILTER_ARM_CUDA_RUNTIME: ${{ steps.filter.outputs.arm_cuda_runtime }}
        run: |
          set -euo pipefail
          out() { printf '%s\n' "$1" >> "$GITHUB_OUTPUT"; }

          # workflow_dispatch has no diff to filter against; treat as a full rebuild
          # and force a redeploy (manual trigger == operator wants the Jetson refreshed).
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            out "build_proto=true"
            out "build_bazel_base=true"
            out "build_cpp_deps=true"
            out "build_cuda_runtime=true"
            out "cpp_touched=true"
            out "cpp_version_changed=true"
            exit 0
          fi

          ap="${FILTER_ARM_PROTO:-false}"
          ab="${FILTER_ARM_BAZEL_BASE:-false}"
          ad="${FILTER_ARM_CPP_DEPS:-false}"
          aa="${FILTER_ARM_CPP_APP:-false}"
          av="${FILTER_ARM_CPP_VERSION:-false}"
          ac="${FILTER_ARM_CUDA_RUNTIME:-false}"

          # bazel-base feeds cpp-dependencies, so a bazel-base change forces a deps rebuild too.
          if [ "${ab}" = "true" ]; then ad="true"; fi

          out "build_proto=${ap}"
          out "build_bazel_base=${ab}"
          out "build_cpp_deps=${ad}"
          out "build_cuda_runtime=${ac}"
          out "cpp_version_changed=${av}"
          if [ "${ap}" = "true" ] || [ "${ab}" = "true" ] || [ "${ad}" = "true" ] || [ "${aa}" = "true" ] || [ "${ac}" = "true" ]; then
            out "cpp_touched=true"
          else
            out "cpp_touched=false"
          fi

  arm_pr:
    name: ARM PR build (no runtime, no push)
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.cpp_touched == 'true'
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "ARM64", "dev"]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run ARM CI orchestrator (PR mode)
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
          MODE: pr
          BUILD_PROTO: ${{ needs.detect-changes.outputs.build_proto == 'true' && '1' || '0' }}
          BUILD_BAZEL_BASE: ${{ needs.detect-changes.outputs.build_bazel_base == 'true' && '1' || '0' }}
          BUILD_CPP_DEPS: ${{ needs.detect-changes.outputs.build_cpp_deps == 'true' && '1' || '0' }}
          BUILD_CUDA_RUNTIME: ${{ needs.detect-changes.outputs.build_cuda_runtime == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ci/arm-build.sh
          ./scripts/ci/arm-build.sh

  build_and_push:
    name: Build and push cpp-accelerator
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect-changes.outputs.cpp_touched == 'true' }}
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "ARM64", "dev"]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run ARM CI orchestrator (push mode)
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: arm64
          MODE: push
          BUILD_PROTO: ${{ needs.detect-changes.outputs.build_proto == 'true' && '1' || '0' }}
          BUILD_BAZEL_BASE: ${{ needs.detect-changes.outputs.build_bazel_base == 'true' && '1' || '0' }}
          BUILD_CPP_DEPS: ${{ needs.detect-changes.outputs.build_cpp_deps == 'true' && '1' || '0' }}
          BUILD_CUDA_RUNTIME: ${{ needs.detect-changes.outputs.build_cuda_runtime == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/ci/arm-build.sh
          ./scripts/ci/arm-build.sh

  arm_skip_notice:
    name: No cpp-accelerator paths changed
    if: needs.detect-changes.outputs.cpp_touched != 'true'
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "ARM64"]
    steps:
      - run: echo "No paths relevant to cpp-accelerator changed; skipping ARM build."

  deploy_prod:
    name: Deploy production (Jetson Nano)
    needs:
      - detect-changes
      - build_and_push
    runs-on: ["self-hosted", "Linux", "ARM64"]
    # Only redeploy the Jetson when src/cpp_accelerator/VERSION actually bumped.
    # A push that only touches deps/proto/app rebuilds the image but keeps the
    # same versioned tag, so the running container is already the right code.
    if: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch') && needs.detect-changes.outputs.cpp_version_changed == 'true' }}
    steps:
      - name: Validate Jetson vars and secrets
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
          JETSON_SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
          ACCELERATOR_CLIENT_CERT: ${{ secrets.ACCELERATOR_CLIENT_CERT }}
          ACCELERATOR_CLIENT_KEY: ${{ secrets.ACCELERATOR_CLIENT_KEY }}
          ACCELERATOR_CA_CERT: ${{ secrets.ACCELERATOR_CA_CERT }}
        run: |
          set -euo pipefail
          missing=()
          for var in JETSON_HOST JETSON_APP_DIRECTORY JETSON_USER \
                     ACCELERATOR_CLIENT_CERT ACCELERATOR_CLIENT_KEY ACCELERATOR_CA_CERT; do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Jetson vars/secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi
          echo "Jetson deploy target: ${JETSON_USER}@${JETSON_HOST}:${JETSON_APP_DIRECTORY}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          JETSON_SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${JETSON_SSH_KEY}" > ~/.ssh/jetson_key
          chmod 600 ~/.ssh/jetson_key

      - name: Add Jetson host to known_hosts
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          tmp_keys="$(mktemp)"
          ssh-keyscan -H "${JETSON_HOST}" > "${tmp_keys}" 2>/dev/null
          while IFS= read -r line; do
            [ -z "${line}" ] && continue
            if ! grep -qxF "${line}" ~/.ssh/known_hosts; then
              printf '%s\n' "${line}" >> ~/.ssh/known_hosts
            fi
          done < "${tmp_keys}"
          rm -f "${tmp_keys}"

      - name: Sync compose file to Jetson
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/jetson_key -o StrictHostKeyChecking=yes"
          REMOTE="${JETSON_USER}@${JETSON_HOST}"

          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p '${JETSON_APP_DIRECTORY}'"

          rsync -az -e "ssh ${SSH_OPTS}" \
            src/cpp_accelerator/docker-compose.yml \
            "${REMOTE}:${JETSON_APP_DIRECTORY}/docker-compose.yml"

      - name: Sync accelerator mTLS secrets to Jetson
        env:
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
          ACCELERATOR_CLIENT_CERT: ${{ secrets.ACCELERATOR_CLIENT_CERT }}
          ACCELERATOR_CLIENT_KEY: ${{ secrets.ACCELERATOR_CLIENT_KEY }}
          ACCELERATOR_CA_CERT: ${{ secrets.ACCELERATOR_CA_CERT }}
        run: |
          set -euo pipefail
          for var in ACCELERATOR_CLIENT_CERT ACCELERATOR_CLIENT_KEY ACCELERATOR_CA_CERT; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: ${var}" >&2
              exit 1
            fi
          done

          SSH_OPTS="-i ~/.ssh/jetson_key -o StrictHostKeyChecking=yes"
          REMOTE="${JETSON_USER}@${JETSON_HOST}"

          stage_dir="$(mktemp -d)"
          trap 'rm -rf "${stage_dir}"' EXIT
          umask 077

          printf '%s' "${ACCELERATOR_CLIENT_CERT}" > "${stage_dir}/client.pem"
          printf '%s' "${ACCELERATOR_CLIENT_KEY}"  > "${stage_dir}/client-key.pem"
          printf '%s' "${ACCELERATOR_CA_CERT}"     > "${stage_dir}/ca.pem"
          chmod 600 "${stage_dir}"/*.pem

          ssh ${SSH_OPTS} "${REMOTE}" \
            "mkdir -p '${JETSON_APP_DIRECTORY}/secrets' && chmod 700 '${JETSON_APP_DIRECTORY}/secrets'"

          rsync -az --chmod=F600 -e "ssh ${SSH_OPTS}" \
            "${stage_dir}/client.pem" \
            "${stage_dir}/client-key.pem" \
            "${stage_dir}/ca.pem" \
            "${REMOTE}:${JETSON_APP_DIRECTORY}/secrets/"

      - name: Pull and restart cpp-accelerator on Jetson
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          JETSON_HOST: ${{ secrets.JETSON_HOST }}
          JETSON_APP_DIRECTORY: ${{ vars.JETSON_APP_DIRECTORY }}
          JETSON_USER: ${{ secrets.JETSON_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/jetson_key -o StrictHostKeyChecking=yes"
          REMOTE="${JETSON_USER}@${JETSON_HOST}"

          proto_version=$(tr -d '[:space:]' < proto/VERSION)
          cpp_version=$(tr -d '[:space:]' < src/cpp_accelerator/VERSION)
          cpp_accelerator_image="${REGISTRY}/${BASE_IMAGE_PREFIX}/cpp-accelerator:cpp-accelerator-${cpp_version}-proto${proto_version}-arm64"

          echo "Deploying cpp-accelerator image: ${cpp_accelerator_image}"

          ssh ${SSH_OPTS} "${REMOTE}" \
            "JETSON_APP_DIRECTORY='${JETSON_APP_DIRECTORY}' \
             ACCELERATOR_IMAGE='${cpp_accelerator_image}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${JETSON_APP_DIRECTORY}"
          export ACCELERATOR_IMAGE
          export ACCELERATOR_SECRETS_DIR="${JETSON_APP_DIRECTORY}/secrets"
          docker compose pull
          docker compose up -d --remove-orphans

          timeout=60
          while [ "${timeout}" -gt 0 ]; do
            running=$(docker ps --filter 'name=^cuda-accelerator-client$' --filter 'status=running' --format '{{.Names}}')
            if [ "${running}" = "cuda-accelerator-client" ]; then
              echo "accelerator-client is running"
              break
            fi
            sleep 1
            timeout=$((timeout - 1))
          done
          if [ "${timeout}" -eq 0 ]; then
            echo "accelerator-client readiness timeout" >&2
            docker ps --filter 'name=cuda-'
            exit 1
          fi
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/jetson_key
