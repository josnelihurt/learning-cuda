name: Docker Monorepo Build (x86)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_PREFIX: josnelihurt-code/learning-cuda

concurrency:
  group: docker-monorepo-x86-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build all images (PRs only)
    if: github.event_name == 'pull_request'
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all images locally
        env:
          REGISTRY: local
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh

  build_and_push:
    name: Build and push all images
    if: github.event_name == 'push'
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all images
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh

      - name: Push all images
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
        run: |
          chmod +x scripts/docker/push-tagged-images.sh
          ./scripts/docker/push-tagged-images.sh

  deploy_prod:
    name: Deploy production to Cloud VM
    needs:
      - build_and_push
    runs-on: ["self-hosted"]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      INFRA_DIRECTORY: /home/jrb/infra
      COMPOSE_DIRECTORY: /home/jrb/infra/services/compose
      COMPOSE_WORKDIR: /home/jrb/infra/services/vultur1
      CUDA_CONFIG_SUBDIR: cuda-learning
      CUDA_DATA_SUBDIR: learning-cuda
      APP_IMAGE: ghcr.io/josnelihurt-code/learning-cuda/app:latest-amd64
      CUDA_WEB_FRONTEND_IMAGE: ghcr.io/josnelihurt-code/learning-cuda/web-frontend:latest-amd64
      CLOUD_VM_SSH_PORT: "22"
    steps:
      - name: Validate Cloud VM secrets and vars
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
          CLOUD_VM_SSH_KEY: ${{ secrets.CLOUD_VM_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${CLOUD_VM_HOST:?Missing CLOUD_VM_HOST secret}"
          : "${CLOUD_VM_USER:?Missing CLOUD_VM_USER secret}"
          : "${CLOUD_VM_SSH_KEY:?Missing CLOUD_VM_SSH_KEY secret}"
          echo "Cloud VM deploy target: ${CLOUD_VM_USER}@${CLOUD_VM_HOST}:${COMPOSE_WORKDIR} (port ${CLOUD_VM_SSH_PORT})"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          CLOUD_VM_SSH_KEY: ${{ secrets.CLOUD_VM_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${CLOUD_VM_SSH_KEY}" > ~/.ssh/cloud_vm_key
          chmod 600 ~/.ssh/cloud_vm_key

      - name: Add Cloud VM to known hosts
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
        run: |
          set -euo pipefail
          ssh-keyscan -p "${CLOUD_VM_SSH_PORT}" -H "${CLOUD_VM_HOST}" >> ~/.ssh/known_hosts

      - name: Sync deployment files to Cloud VM
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/cloud_vm_key -p ${CLOUD_VM_SSH_PORT} -o StrictHostKeyChecking=yes"
          REMOTE="${CLOUD_VM_USER}@${CLOUD_VM_HOST}"

          ssh ${SSH_OPTS} "${REMOTE}" \
            "mkdir -p \
               '${COMPOSE_DIRECTORY}/config/${CUDA_CONFIG_SUBDIR}' \
               '${COMPOSE_DIRECTORY}/data/${CUDA_DATA_SUBDIR}'"

          rsync -az -e "ssh ${SSH_OPTS}" \
            infra/services/compose/learning-cuda.yaml \
            "${REMOTE}:${COMPOSE_DIRECTORY}/learning-cuda.yaml"

          rsync -az -e "ssh ${SSH_OPTS}" \
            config/config.production.yaml \
            config/flags.goff.yaml \
            "${REMOTE}:${COMPOSE_DIRECTORY}/config/${CUDA_CONFIG_SUBDIR}/"

          rsync -az --delete -e "ssh ${SSH_OPTS}" \
            data/ \
            "${REMOTE}:${COMPOSE_DIRECTORY}/data/${CUDA_DATA_SUBDIR}/"

      - name: Pull and restart services on Cloud VM
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/cloud_vm_key -p ${CLOUD_VM_SSH_PORT} -o StrictHostKeyChecking=yes"
          REMOTE="${CLOUD_VM_USER}@${CLOUD_VM_HOST}"
          ssh ${SSH_OPTS} "${REMOTE}" \
            "COMPOSE_WORKDIR='${COMPOSE_WORKDIR}' \
             APP_IMAGE='${APP_IMAGE}' \
             CUDA_WEB_FRONTEND_IMAGE='${CUDA_WEB_FRONTEND_IMAGE}' \
             bash -s" <<'EOF'
          set -euo pipefail
          cd "${COMPOSE_WORKDIR}"
          export APP_IMAGE CUDA_WEB_FRONTEND_IMAGE

          docker compose up --pull always --force-recreate -d \
            learning-cuda-go-api learning-cuda-frontend

          timeout=60
          while [ "${timeout}" -gt 0 ]; do
            go_ok=$(docker ps --filter "name=^cuda-go-server$" --filter "status=running" --format "{{.Names}}")
            fe_ok=$(docker ps --filter "name=^cuda-web-frontend$" --filter "status=running" --format "{{.Names}}")
            if [ "${go_ok}" = "cuda-go-server" ] && [ "${fe_ok}" = "cuda-web-frontend" ]; then
              echo "Services are running"
              break
            fi
            sleep 1
            timeout=$((timeout - 1))
          done
          if [ "${timeout}" -eq 0 ]; then
            echo "Service readiness timeout reached" >&2
            docker ps --filter "name=cuda-"
            exit 1
          fi
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/cloud_vm_key
