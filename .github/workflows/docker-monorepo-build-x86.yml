name: Docker Monorepo Build (x86)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_all:
        description: Force full rebuild regardless of changed paths
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_PREFIX: josnelihurt-code/learning-cuda

concurrency:
  group: docker-monorepo-x86-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

# Smart CI: build/push steps only run when paths relevant to each image change.
# app (go-api) and web-frontend are independently gated so a frontend-only PR
# doesn't rebuild the Go binary (and vice versa).
# Force a full rebuild with either:
#   - PR label: ci:full-build
#   - workflow_dispatch (manual runs always force a full rebuild)
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ["self-hosted"]
    outputs:
      app: ${{ steps.decide.outputs.app }}
      web_frontend: ${{ steps.decide.outputs.web_frontend }}
      yolo_model: ${{ steps.decide.outputs.yolo_model }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'proto/**'
              - 'src/go_api/**'
              - 'Dockerfile'
              - 'runtime/**'
              - 'data/**'
              - 'buf.yaml'
              - 'buf.lock'
              - 'buf.gen.yaml'
              - 'buf.gen.backend.yaml'
              - 'scripts/docker/build-local.sh'
              - 'scripts/docker/push-tagged-images.sh'
              - '.github/workflows/docker-monorepo-build-x86.yml'
            web_frontend:
              - 'proto/**'
              - 'src/front-end/**'
              - 'buf.yaml'
              - 'buf.lock'
              - 'buf.gen.yaml'
              - 'scripts/docker/build-local.sh'
              - 'scripts/docker/push-tagged-images.sh'
              - '.github/workflows/docker-monorepo-build-x86.yml'
            yolo_model:
              - 'src/cpp_accelerator/yolo-model-gen/**'
              - 'scripts/models/export_yolo_to_onnx.py'

      - name: Decide build scope
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_ALL: ${{ inputs.force_all }}
          LABEL_FORCE: ${{ contains(github.event.pull_request.labels.*.name, 'ci:full-build') }}
          FILTER_APP: ${{ steps.filter.outputs.app }}
          FILTER_WEB_FRONTEND: ${{ steps.filter.outputs.web_frontend }}
          FILTER_YOLO_MODEL: ${{ steps.filter.outputs.yolo_model }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] \
             || [ "${FORCE_ALL}" = "true" ] \
             || [ "${LABEL_FORCE}" = "true" ]; then
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "web_frontend=true" >> "$GITHUB_OUTPUT"
            echo "yolo_model=true" >> "$GITHUB_OUTPUT"
          else
            echo "app=${FILTER_APP:-false}" >> "$GITHUB_OUTPUT"
            echo "web_frontend=${FILTER_WEB_FRONTEND:-false}" >> "$GITHUB_OUTPUT"
            echo "yolo_model=${FILTER_YOLO_MODEL:-false}" >> "$GITHUB_OUTPUT"
          fi

  build_app:
    name: Build app image (PRs only)
    if: github.event_name == 'pull_request'
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build app image locally
        if: needs.detect-changes.outputs.app == 'true'
        env:
          REGISTRY: local
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh \
            --stage proto-tools \
            --stage go-builder \
            --stage runtime-base \
            --stage proto \
            --stage golang \
            --stage app

      - name: No relevant changes
        if: needs.detect-changes.outputs.app != 'true'
        run: echo "No paths relevant to app image changed; skipping app build."

  build_web_frontend:
    name: Build web-frontend image (PRs only)
    if: github.event_name == 'pull_request'
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build web-frontend image locally
        if: needs.detect-changes.outputs.web_frontend == 'true'
        env:
          REGISTRY: local
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh \
            --stage proto-tools \
            --stage proto \
            --stage web-frontend

      - name: No relevant changes
        if: needs.detect-changes.outputs.web_frontend != 'true'
        run: echo "No paths relevant to web-frontend changed; skipping web-frontend build."

  push_app:
    name: Build and push app image
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: needs.detect-changes.outputs.app == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app image
        if: needs.detect-changes.outputs.app == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh \
            --stage proto-tools \
            --stage go-builder \
            --stage runtime-base \
            --stage proto \
            --stage golang \
            --stage app

      - name: Push app image
        if: needs.detect-changes.outputs.app == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
          LATEST_ALIASES: app
        run: |
          chmod +x scripts/docker/push-tagged-images.sh
          ./scripts/docker/push-tagged-images.sh

      - name: No relevant changes
        if: needs.detect-changes.outputs.app != 'true'
        run: echo "No paths relevant to app image changed; skipping app build and push."

  push_web_frontend:
    name: Build and push web-frontend image
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: needs.detect-changes.outputs.web_frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web-frontend image
        if: needs.detect-changes.outputs.web_frontend == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh \
            --stage proto-tools \
            --stage proto \
            --stage web-frontend

      - name: Push web-frontend image
        if: needs.detect-changes.outputs.web_frontend == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
          LATEST_ALIASES: web-frontend
        run: |
          chmod +x scripts/docker/push-tagged-images.sh
          ./scripts/docker/push-tagged-images.sh

      - name: No relevant changes
        if: needs.detect-changes.outputs.web_frontend != 'true'
        run: echo "No paths relevant to web-frontend changed; skipping web-frontend build and push."

  build_yolo_model:
    name: Build yolo-model-gen image (PRs only)
    if: github.event_name == 'pull_request'
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build yolo-model-gen image locally
        if: needs.detect-changes.outputs.yolo_model == 'true'
        env:
          REGISTRY: local
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh --stage yolo-tools --stage yolo-model

      - name: No relevant changes
        if: needs.detect-changes.outputs.yolo_model != 'true'
        run: echo "No paths relevant to yolo-model-gen changed; skipping build."

  push_yolo_model:
    name: Build and push yolo-model-gen image
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: detect-changes
    runs-on: ["self-hosted", "Linux", "X64"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: needs.detect-changes.outputs.yolo_model == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push yolo-model-gen image
        if: needs.detect-changes.outputs.yolo_model == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
        run: |
          chmod +x scripts/docker/build-local.sh
          ./scripts/docker/build-local.sh --stage yolo-tools --stage yolo-model

      - name: Push yolo-model-gen image
        if: needs.detect-changes.outputs.yolo_model == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BASE_IMAGE_PREFIX: ${{ env.BASE_IMAGE_PREFIX }}
          ARCH: amd64
          LATEST_ALIASES: yolo-model-gen
        run: |
          chmod +x scripts/docker/push-tagged-images.sh

      - name: No relevant changes
        if: needs.detect-changes.outputs.yolo_model != 'true'
        run: echo "No paths relevant to yolo-model-gen changed; skipping build and push."

  deploy_prod:
    name: Deploy production to Cloud VM
    needs:
      - push_app
      - push_web_frontend
      - push_yolo_model
    runs-on: ["self-hosted"]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      INFRA_DIRECTORY: /home/jrb/infra
      COMPOSE_DIRECTORY: /home/jrb/infra/services/compose
      COMPOSE_WORKDIR: /home/jrb/infra/services/vultur1
      CUDA_CONFIG_SUBDIR: cuda-learning
      CUDA_DATA_SUBDIR: learning-cuda
      APP_IMAGE: ghcr.io/josnelihurt-code/learning-cuda/app:latest-amd64
      CUDA_WEB_FRONTEND_IMAGE: ghcr.io/josnelihurt-code/learning-cuda/web-frontend:latest-amd64
      CLOUD_VM_SSH_PORT: "22"
    steps:
      - name: Validate Cloud VM secrets and vars
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
          CLOUD_VM_SSH_KEY: ${{ secrets.CLOUD_VM_SSH_KEY }}
          ACCELERATOR_SERVER_CERT: ${{ secrets.ACCELERATOR_SERVER_CERT }}
          ACCELERATOR_SERVER_KEY: ${{ secrets.ACCELERATOR_SERVER_KEY }}
          ACCELERATOR_CA_CERT: ${{ secrets.ACCELERATOR_CA_CERT }}
        run: |
          set -euo pipefail
          : "${CLOUD_VM_HOST:?Missing CLOUD_VM_HOST secret}"
          : "${CLOUD_VM_USER:?Missing CLOUD_VM_USER secret}"
          : "${CLOUD_VM_SSH_KEY:?Missing CLOUD_VM_SSH_KEY secret}"
          : "${ACCELERATOR_SERVER_CERT:?Missing ACCELERATOR_SERVER_CERT secret}"
          : "${ACCELERATOR_SERVER_KEY:?Missing ACCELERATOR_SERVER_KEY secret}"
          : "${ACCELERATOR_CA_CERT:?Missing ACCELERATOR_CA_CERT secret}"
          echo "Cloud VM deploy target: ${CLOUD_VM_USER}@${CLOUD_VM_HOST}:${COMPOSE_WORKDIR} (port ${CLOUD_VM_SSH_PORT})"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          CLOUD_VM_SSH_KEY: ${{ secrets.CLOUD_VM_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${CLOUD_VM_SSH_KEY}" > ~/.ssh/cloud_vm_key
          chmod 600 ~/.ssh/cloud_vm_key

      - name: Add Cloud VM to known hosts
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
        run: |
          set -euo pipefail
          ssh-keyscan -p "${CLOUD_VM_SSH_PORT}" -H "${CLOUD_VM_HOST}" >> ~/.ssh/known_hosts

      - name: Sync deployment files to Cloud VM
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/cloud_vm_key -p ${CLOUD_VM_SSH_PORT} -o StrictHostKeyChecking=yes"
          REMOTE="${CLOUD_VM_USER}@${CLOUD_VM_HOST}"

          ssh ${SSH_OPTS} "${REMOTE}" \
            "mkdir -p \
               '${COMPOSE_DIRECTORY}/config/${CUDA_CONFIG_SUBDIR}' \
               '${COMPOSE_DIRECTORY}/data/${CUDA_DATA_SUBDIR}'"

          rsync -az -e "ssh ${SSH_OPTS}" \
            infra/services/compose/learning-cuda.yaml \
            "${REMOTE}:${COMPOSE_DIRECTORY}/learning-cuda.yaml"

          rsync -az -e "ssh ${SSH_OPTS}" \
            config/config.production.yaml \
            config/flags.goff.yaml \
            src/front-end/nginx.conf \
            "${REMOTE}:${COMPOSE_DIRECTORY}/config/${CUDA_CONFIG_SUBDIR}/"

          rsync -az --delete -e "ssh ${SSH_OPTS}" \
            data/ \
            "${REMOTE}:${COMPOSE_DIRECTORY}/data/${CUDA_DATA_SUBDIR}/"

      - name: Sync accelerator mTLS secrets to Cloud VM
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
          ACCELERATOR_SERVER_CERT: ${{ secrets.ACCELERATOR_SERVER_CERT }}
          ACCELERATOR_SERVER_KEY: ${{ secrets.ACCELERATOR_SERVER_KEY }}
          ACCELERATOR_CA_CERT: ${{ secrets.ACCELERATOR_CA_CERT }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/cloud_vm_key -p ${CLOUD_VM_SSH_PORT} -o StrictHostKeyChecking=yes"
          REMOTE="${CLOUD_VM_USER}@${CLOUD_VM_HOST}"
          REMOTE_SECRETS_DIR="${COMPOSE_DIRECTORY}/config/${CUDA_CONFIG_SUBDIR}/secrets"

          stage_dir="$(mktemp -d)"
          trap 'rm -rf "${stage_dir}"' EXIT
          umask 077

          printf '%s' "${ACCELERATOR_SERVER_CERT}" > "${stage_dir}/server.pem"
          printf '%s' "${ACCELERATOR_SERVER_KEY}"  > "${stage_dir}/server-key.pem"
          printf '%s' "${ACCELERATOR_CA_CERT}"     > "${stage_dir}/ca.pem"
          chmod 600 "${stage_dir}"/*.pem

          ssh ${SSH_OPTS} "${REMOTE}" \
            "mkdir -p '${REMOTE_SECRETS_DIR}' && chmod 700 '${REMOTE_SECRETS_DIR}'"

          rsync -az --chmod=F600 -e "ssh ${SSH_OPTS}" \
            "${stage_dir}/server.pem" \
            "${stage_dir}/server-key.pem" \
            "${stage_dir}/ca.pem" \
            "${REMOTE}:${REMOTE_SECRETS_DIR}/"

      - name: Pull and restart services on Cloud VM
        env:
          CLOUD_VM_HOST: ${{ secrets.CLOUD_VM_HOST }}
          CLOUD_VM_USER: ${{ secrets.CLOUD_VM_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i ~/.ssh/cloud_vm_key -p ${CLOUD_VM_SSH_PORT} -o StrictHostKeyChecking=yes"
          REMOTE="${CLOUD_VM_USER}@${CLOUD_VM_HOST}"
          ssh ${SSH_OPTS} "${REMOTE}" \
            "COMPOSE_WORKDIR='${COMPOSE_WORKDIR}' \
             APP_IMAGE='${APP_IMAGE}' \
             CUDA_WEB_FRONTEND_IMAGE='${CUDA_WEB_FRONTEND_IMAGE}' \
             bash -s" <<'EOF'
          set -euo pipefail
          cd "${COMPOSE_WORKDIR}"
          export APP_IMAGE CUDA_WEB_FRONTEND_IMAGE

          docker compose up --pull always --force-recreate -d \
            learning-cuda-go-api learning-cuda-frontend

          timeout=60
          while [ "${timeout}" -gt 0 ]; do
            go_ok=$(docker ps --filter "name=^cuda-go-server$" --filter "status=running" --format "{{.Names}}")
            fe_ok=$(docker ps --filter "name=^cuda-web-frontend$" --filter "status=running" --format "{{.Names}}")
            if [ "${go_ok}" = "cuda-go-server" ] && [ "${fe_ok}" = "cuda-web-frontend" ]; then
              echo "Services are running"
              break
            fi
            sleep 1
            timeout=$((timeout - 1))
          done
          if [ "${timeout}" -eq 0 ]; then
            echo "Service readiness timeout reached" >&2
            docker ps --filter "name=cuda-"
            exit 1
          fi
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/cloud_vm_key
