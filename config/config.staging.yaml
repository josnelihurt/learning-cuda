environment: "staging"

server:
  http_port: "0.0.0.0:8080"
  https_port: "0.0.0.0:8443"
  tls:
    enabled: false

stream:
  transport_format: "json"
  websocket_endpoint: "/ws"

features:
  use_binary_protocol: false
  enable_grpc_streaming: false
  enable_observability: true
  stream.transport_format: "json"
  stream.websocket_endpoint: ""

go_feature_flag:
  enabled: true
  file_path: "/app/config/flags.goff.yaml"
  namespace: "default"

observability:
  service_name: "cuda-image-processor"
  service_version: "1.0.0"
  otel_collector_grpc_endpoint: "otel-collector:4317"
  otel_collector_http_endpoint: "http://otel-collector:4318"
  trace_sampling_rate: 1.0

logging:
  level: "info"
  format: "json"
  output: "stdout"
  include_caller: true
  remote_enabled: true
  remote_endpoint: "https://otel-cuda-demo.josnelihurt.me/v1/logs"
  remote_environment: "staging"

processor:
  library_base_path: "/app/lib"
  grpc_server_address: "grpc-server:60061"

static_images:
  directory: "/app/data/static_images"

tools:
  observability:
    - id: "jaeger"
      name: "Jaeger Tracing"
      icon_path: "/static/img/tools/jaeger.svg"
      type: "url"
      url: "https://jaeger-cuda-demo.josnelihurt.me"
    - id: "grafana_logs"
      name: "Logs Dashboard"
      icon_path: "/static/img/tools/grafana.svg"
      type: "url"
      url: "https://grafana-cuda-demo.josnelihurt.me/d/cuda-multi-layer-logs"
    - id: "grafana_explore"
      name: "Grafana Explore"
      icon_path: "/static/img/tools/grafana.svg"
      type: "url"
      url: "https://grafana-cuda-demo.josnelihurt.me/explore"
  features:
    - id: "feature_flags"
      name: "Feature Flags"
      icon_path: ""
      type: "action"
      action: "open_feature_flags"
  testing:
    - id: "bdd_reports"
      name: "Test Reports (BDD)"
      icon_path: ""
      type: "url"
      url: "https://reports.localhost"
    - id: "e2e_reports"
      name: "E2E Test Results (Playwright)"
      icon_path: "/static/img/tools/playwright.svg"
      type: "url"
      url: "https://reports.localhost/e2e"
    - id: "coverage_reports"
      name: "Code Coverage"
      icon_path: ""
      type: "url"
      url: "https://reports.localhost/coverage"

