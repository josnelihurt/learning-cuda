services:
  app-dev:
    image: ubuntu:22.04
    container_name: cuda-image-processor
    restart: unless-stopped
    
    ports:
      - "8080:8080"
      - "8443:8443"
      - "60062:60062"
    
    volumes:
      - ./bin/server:/app/server:ro
      - ./data:/app/data:ro
      - ./.secrets:/app/.secrets:ro
      - ./config/config.dev.yaml:/app/config/config.yaml:ro
    
    working_dir: /app
    
    command: ["/app/server", "-config=/app/config/config.yaml"]
    
    networks:
      dev-network:
        aliases:
          - go-app

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-frontend-dev:
    build:
      context: .
      dockerfile: src/front-end/Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-ghcr.io/josnelihurt-code/learning-cuda}
        BASE_TAG: ${BASE_TAG:-latest}
        TARGETARCH: ${TARGETARCH:-amd64}
    image: ${CUDA_WEB_FRONTEND_IMAGE:-cuda-learning-web-frontend:latest}
    container_name: cuda-web-frontend-dev
    restart: unless-stopped
    depends_on:
      app-dev:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data:ro
    networks:
      - dev-network

  integration-tests:
    build:
      context: .
      dockerfile: test/integration/Dockerfile.tests
      target: integration-tests
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
        BASE_REGISTRY: ${BASE_REGISTRY:-ghcr.io/josnelihurt-code/learning-cuda}
        BASE_TAG: ${BASE_TAG:-latest}
        PROTO_VERSION: ${PROTO_VERSION:-1.0.0}
        CPP_VERSION: ${CPP_VERSION:-1.0.0}
        GOLANG_VERSION: ${GOLANG_VERSION:-1.0.0}
    container_name: integration-tests
    network_mode: host
    volumes:
      - ./test/integration/tests/acceptance/.ignore/test-results:/workspace/test/integration/tests/acceptance/.ignore/test-results
    profiles:
      - testing

  e2e-tests:
    build:
      context: .
      dockerfile: test/integration/Dockerfile.tests
      target: e2e-tests
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
        BASE_REGISTRY: ${BASE_REGISTRY:-ghcr.io/josnelihurt-code/learning-cuda}
        BASE_TAG: ${BASE_TAG:-latest}
        PROTO_VERSION: ${PROTO_VERSION:-1.0.0}
        CPP_VERSION: ${CPP_VERSION:-1.0.0}
        GOLANG_VERSION: ${GOLANG_VERSION:-1.0.0}
    container_name: e2e-tests
    network_mode: host
    
    environment:
      - PLAYWRIGHT_SINGLE_BROWSER=${PLAYWRIGHT_SINGLE_BROWSER:-true}
      - PLAYWRIGHT_VIDEO=${PLAYWRIGHT_VIDEO:-true}
      - PLAYWRIGHT_SCREENSHOTS=${PLAYWRIGHT_SCREENSHOTS:-true}
      - PLAYWRIGHT_TRACE=${PLAYWRIGHT_TRACE:-true}
    
    volumes:
      - ./src/front-end/src:/workspace/src/front-end/src:ro
      - ./src/front-end/tests:/workspace/src/front-end/tests
      - ./src/front-end/playwright.config.ts:/workspace/src/front-end/playwright.config.ts:ro
      - ./src/front-end/tsconfig.json:/workspace/src/front-end/tsconfig.json:ro
      - ./.ignore/front-end:/workspace/.ignore/front-end
      - ./data:/workspace/data:ro
    
    profiles:
      - testing

  e2e-report-viewer:
    image: node:20-alpine
    container_name: e2e-report-viewer
    working_dir: /app
    ports:
      - "5051:8080"
    
    volumes:
      - ./.ignore/front-end/playwright-report:/app
    
    command: npx http-server /app -p 8080
    
    networks:
      - dev-network
    
    profiles:
      - testing

  cucumber-report:
    image: node:18-alpine
    container_name: cucumber-report-viewer
    working_dir: /app
    ports:
      - "5050:8080"
    volumes:
      - ./test/integration/tests/acceptance/.ignore/test-results:/app/input:ro
      - ./test/integration/tests/acceptance/.ignore/reports:/app/output
    command: >
      sh -c "npm init -y &&
             npm install multiple-cucumber-html-reporter http-server && 
             node -e \"const report = require('multiple-cucumber-html-reporter'); report.generate({ jsonDir: '/app/input', reportPath: '/app/output', displayDuration: true, displayReportTime: true, pageTitle: 'Feature Flags BDD Tests', reportName: 'CUDA Learning - Integration Tests', metadata: { browser: { name: 'API Tests', version: '1.0' }, platform: { name: 'Docker', version: 'latest' } } }); console.log('Report generated!');\" && 
             echo 'Starting HTTP server on port 8080...' &&
             npx http-server /app/output -p 8080"
    networks:
      - dev-network
    profiles:
      - testing

  coverage-report-viewer:
    image: node:20-alpine
    container_name: coverage-report-viewer
    working_dir: /app
    ports:
      - "5052:8080"
    volumes:
      - ./test/coverage:/app:ro
    command: npx http-server /app -p 8080
    networks:
      - dev-network
    profiles:
      - coverage

  gopkgview:
    image: ghcr.io/grishy/gopkgview:latest
    container_name: gopkgview
    working_dir: /app
    ports:
      - "5053:8080"
    volumes:
      - .:/app:ro
    command: --root /app/src/go_api --gomod /app/go.mod --skip-browser --addr :8080
    networks:
      - dev-network
    profiles:
      - coverage

  lint-frontend:
    image: node:20-alpine
    container_name: lint-frontend
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    working_dir: /workspace/src/front-end
    volumes:
      - ./src/front-end:/workspace/src/front-end
    command: sh -c "npm install && npm run lint && npm run format:check"
    profiles:
      - lint

  lint-golang:
    image: golang:1.24-alpine
    container_name: lint-golang
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    environment:
      - GOFLAGS=-buildvcs=false
    command: sh -c "
      apk add --no-cache git build-base gcc musl-dev &&
      go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest &&
      export PATH=$$PATH:$$(go env GOPATH)/bin &&
      export CGO_ENABLED=1 &&
      golangci-lint run --timeout 5m --skip-dirs='test/integration/tests,src/tools/generate-video-metadata,proto/gen'
      "
    profiles:
      - lint

  lint-cpp:
    image: ubuntu:22.04
    container_name: lint-cpp
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      - DEBIAN_FRONTEND=noninteractive
    command: >
      sh -c "apt-get update -qq 2>&1 | grep -v 'Permission denied' || true && 
             apt-get install -y -qq clang-tidy clang-format > /dev/null 2>&1 && 
             find src/cpp_accelerator -name '*.cpp' -o -name '*.h' | grep -v BUILD | xargs clang-format --dry-run -Werror || echo 'Format check complete' &&
             echo 'C++ linting complete'"
    profiles:
      - lint

  lint-language:
    build:
      context: .
      dockerfile: scripts/linters/language.dockerfile
    container_name: lint-language
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./.git:/workspace/.git:ro
    profiles:
      - lint

volumes:
  go-cache:
  go-mod-cache:

networks:
  dev-network:
    driver: bridge

