services:
  app:
    image: ${APP_IMAGE:-ghcr.io/josnelihurt-code/learning-cuda:amd64-latest}
    container_name: cuda-image-processor-staging
    restart: unless-stopped
    runtime: nvidia
    
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    
    volumes:
      - ./data:/data:ro
      - ./config/config.staging.yaml:/app/config/config.yaml:ro
      - /tmp:/tmp
      - ./.secrets:/app/.secrets:ro

    ports:
      - "60062:60062"
    
    networks:
      traefik:
        aliases:
          - go-app

    depends_on:
      traefik:
        condition: service_started
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-frontend:
    image: ${CUDA_WEB_FRONTEND_IMAGE:-ghcr.io/josnelihurt-code/learning-cuda/web-frontend:latest-amd64}
    container_name: cuda-web-frontend-staging
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      traefik:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cuda-app.rule=Host(`app.localhost`)"
      - "traefik.http.routers.cuda-app.entrypoints=websecure"
      - "traefik.http.routers.cuda-app.tls=true"
      - "traefik.http.routers.cuda-app.priority=120"
      - "traefik.http.services.cuda-app.loadbalancer.server.port=80"

  traefik:
    image: traefik:latest
    container_name: traefik-staging
    restart: unless-stopped
    
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
      - "--accesslog=true"
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    
    networks:
      - traefik
    
    depends_on: []
    

  test-reports:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-reports
    image: cuda-learning-test-reports
    container_name: test-reports-staging
    restart: unless-stopped
    profiles:
      - reports
    
    
    command: npx http-server /app/reports -p 8080
    
    networks:
      - traefik
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.test-reports.rule=Host(`reports.localhost`)"
      - "traefik.http.routers.test-reports.entrypoints=websecure"
      - "traefik.http.routers.test-reports.tls=true"
      - "traefik.http.routers.test-reports.priority=100"
      - "traefik.http.services.test-reports.loadbalancer.server.port=8080"

networks:
  traefik:
    name: traefik-staging
    driver: bridge

volumes: {}

