syntax = "proto3";

package cuda_learning;

import "common.proto";
import "google/api/annotations.proto";

option go_package = "github.com/jrb/cuda-learning/proto/gen";

enum GenericFilterParameterType {
  GENERIC_FILTER_PARAMETER_TYPE_UNSPECIFIED = 0;
  GENERIC_FILTER_PARAMETER_TYPE_SELECT = 1;
  GENERIC_FILTER_PARAMETER_TYPE_RANGE = 2;
  GENERIC_FILTER_PARAMETER_TYPE_NUMBER = 3;
  GENERIC_FILTER_PARAMETER_TYPE_CHECKBOX = 4;
  GENERIC_FILTER_PARAMETER_TYPE_TEXT = 5;
}

message GenericFilterParameterOption {
  string value = 1 [json_name = "value"];
  string label = 3 [json_name = "label"];
}

message GenericFilterParameter {
  string id = 1 [json_name = "id"];
  string name = 3 [json_name = "name"];
  GenericFilterParameterType type = 5 [json_name = "type"];
  repeated GenericFilterParameterOption options = 7 [json_name = "options"];
  string default_value = 9 [json_name = "default_value"];
  map<string, string> metadata = 11 [json_name = "metadata"];
}

message GenericFilterDefinition {
  string id = 1 [json_name = "id"];
  string name = 3 [json_name = "name"];
  repeated GenericFilterParameter parameters = 5 [json_name = "parameters"];
  repeated AcceleratorType supported_accelerators = 7 [json_name = "supported_accelerators"];
}

message GenericFilterParameterSelection {
  string parameter_id = 1 [json_name = "parameter_id"];
  repeated string values = 3 [json_name = "values"];
}

message GenericFilterSelection {
  string filter_id = 1 [json_name = "filter_id"];
  repeated GenericFilterParameterSelection parameters = 3 [json_name = "parameters"];
}

message ListFiltersRequest {
  string api_version = 1 [json_name = "api_version"];
  TraceContext trace_context = 3 [json_name = "trace_context"];
}

message ListFiltersResponse {
  repeated GenericFilterDefinition filters = 1 [json_name = "filters"];
  string api_version = 3 [json_name = "api_version"];
  TraceContext trace_context = 5 [json_name = "trace_context"];
}

// Request: Go passes raw image buffer
message ProcessImageRequest {
  bytes image_data = 1 [json_name = "image_data"];
  int32 width = 3 [json_name = "width"];
  int32 height = 5 [json_name = "height"];
  int32 channels = 7 [json_name = "channels"];
  repeated FilterType filters = 9 [json_name = "filters"];
  AcceleratorType accelerator = 11 [json_name = "accelerator"];
  GrayscaleType grayscale_type = 13 [json_name = "grayscale_type"];
  GaussianBlurParameters blur_params = 25 [json_name = "blur_params"];
  repeated GenericFilterSelection generic_filters = 27 [json_name = "generic_filters"];
  string session_id = 29 [json_name = "session_id"];
  ModelInferenceParameters model_params = 31 [json_name = "model_params"];
  uint64 frame_id = 33 [json_name = "frame_id"];

  // OpenTelemetry trace context propagation (deprecated - use trace_context instead)
  string trace_id = 15 [json_name = "trace_id"];
  string span_id = 17 [json_name = "span_id"];
  uint32 trace_flags = 19 [json_name = "trace_flags"];
  
  TraceContext trace_context = 21 [json_name = "trace_context"];
  string api_version = 23 [json_name = "api_version"];
}

message Detection {
  float x = 1 [json_name = "x"];
  float y = 2 [json_name = "y"];
  float width = 3 [json_name = "width"];
  float height = 4 [json_name = "height"];
  int32 class_id = 5 [json_name = "class_id"];
  string class_name = 6 [json_name = "class_name"];
  float confidence = 7 [json_name = "confidence"];
}

// Response: C++ returns processed image buffer
message ProcessImageResponse {
  int32 code = 1 [json_name = "code"];
  string message = 3 [json_name = "message"];
  bytes image_data = 5 [json_name = "image_data"];
  int32 width = 7 [json_name = "width"];
  int32 height = 9 [json_name = "height"];
  int32 channels = 11 [json_name = "channels"];
  TraceContext trace_context = 13 [json_name = "trace_context"];
  string api_version = 15 [json_name = "api_version"];
  repeated Detection detections = 17 [json_name = "detections"];
  uint64 frame_id = 19 [json_name = "frame_id"];
}

// Lightweight message sent on the detection WebRTC DataChannel
message DetectionFrame {
  uint64 frame_id = 1 [json_name = "frame_id"];
  repeated Detection detections = 2 [json_name = "detections"];
  int32 image_width = 3 [json_name = "image_width"];
  int32 image_height = 4 [json_name = "image_height"];
}

message StartVideoPlaybackRequest {
  string video_id = 1 [json_name = "video_id"];
  string session_id = 3 [json_name = "session_id"];
  repeated FilterType filters = 5 [json_name = "filters"];
  AcceleratorType accelerator = 7 [json_name = "accelerator"];
  GrayscaleType grayscale_type = 9 [json_name = "grayscale_type"];
  GaussianBlurParameters blur_params = 11 [json_name = "blur_params"];
  repeated GenericFilterSelection generic_filters = 13 [json_name = "generic_filters"];
  TraceContext trace_context = 15 [json_name = "trace_context"];
  string api_version = 17 [json_name = "api_version"];
}

message StartVideoPlaybackResponse {
  int32 code = 1 [json_name = "code"];
  string message = 3 [json_name = "message"];
  string session_id = 5 [json_name = "session_id"];
  TraceContext trace_context = 7 [json_name = "trace_context"];
  string api_version = 9 [json_name = "api_version"];
}

message StopVideoPlaybackRequest {
  string session_id = 1 [json_name = "session_id"];
  TraceContext trace_context = 3 [json_name = "trace_context"];
  string api_version = 5 [json_name = "api_version"];
}

message StopVideoPlaybackResponse {
  int32 code = 1 [json_name = "code"];
  string message = 3 [json_name = "message"];
  string session_id = 5 [json_name = "session_id"];
  bool stopped = 7 [json_name = "stopped"];
  TraceContext trace_context = 9 [json_name = "trace_context"];
  string api_version = 11 [json_name = "api_version"];
}

// Lifecycle management
message InitRequest {
  int32 cuda_device_id = 1;
  TraceContext trace_context = 3 [json_name = "trace_context"];
  string api_version = 5 [json_name = "api_version"];
}

message InitResponse {
  int32 code = 1;
  string message = 3;
  TraceContext trace_context = 5 [json_name = "trace_context"];
  string api_version = 7 [json_name = "api_version"];
}

// Capabilities query (internal use)
message GetCapabilitiesRequest {
  string api_version = 1 [json_name = "api_version"];
}

message GetCapabilitiesResponse {
  int32 code = 1 [json_name = "code"];
  string message = 3 [json_name = "message"];
  LibraryCapabilities capabilities = 5 [json_name = "capabilities"];
}

// Version information query
message GetVersionInfoRequest {
  string api_version = 1 [json_name = "api_version"];
  TraceContext trace_context = 3 [json_name = "trace_context"];
}

message GetVersionInfoResponse {
  int32 code = 1 [json_name = "code"];
  string message = 3 [json_name = "message"];
  string server_version = 5 [json_name = "server_version"];
  string library_version = 7 [json_name = "library_version"];
  string build_date = 9 [json_name = "build_date"];
  string build_commit = 11 [json_name = "build_commit"];
  TraceContext trace_context = 13 [json_name = "trace_context"];
  string api_version = 15 [json_name = "api_version"];
}

service ImageProcessorService {
  rpc ListFilters(ListFiltersRequest) returns (ListFiltersResponse) {
    option (google.api.http) = {
      get: "/api/v1/filters"
    };
  }

  rpc StartVideoPlayback(StartVideoPlaybackRequest) returns (StartVideoPlaybackResponse) {
    option (google.api.http) = {
      post: "/api/v1/process/video/start"
      body: "*"
    };
  }

  rpc StopVideoPlayback(StopVideoPlaybackRequest) returns (StopVideoPlaybackResponse) {
    option (google.api.http) = {
      post: "/api/v1/process/video/stop"
      body: "*"
    };
  }

  rpc GetVersionInfo(GetVersionInfoRequest) returns (GetVersionInfoResponse);
}
