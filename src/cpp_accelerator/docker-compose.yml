services:
  accelerator-client:
    image: ${ACCELERATOR_IMAGE:-ghcr.io/josnelihurt-code/learning-cuda/cpp-accelerator:latest-arm64}
    container_name: cuda-accelerator-client
    restart: unless-stopped
    runtime: nvidia

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/local/lib:/usr/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH
      - OTEL_LOGS_ENABLED=false
      - OTEL_LOGS_ENDPOINT=https://otel-cuda-demo.josnelihurt.me/v1/logs
      - OTEL_ENVIRONMENT=production

    command:
      - accelerator_control_client
      - --control_addr=vultur.josnelihurt.me:60062
      - --device_id=${ACCELERATOR_DEVICE_ID:-jetson-prod-01}
      - --display_name=${ACCELERATOR_DISPLAY_NAME:-Jetson Orin}
      - --client_cert=/secrets/client.pem
      - --client_key=/secrets/client-key.pem
      - --ca_cert=/secrets/ca.pem

    volumes:
      - ${ACCELERATOR_SECRETS_DIR:-./secrets}:/secrets:ro
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1:ro
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so:ro
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1.0.0:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1.0.0:ro
      - /usr/lib/aarch64-linux-gnu/libnvinfer.so.10:/usr/lib/aarch64-linux-gnu/libnvinfer.so.10:ro
      - /usr/lib/aarch64-linux-gnu/libnvinfer.so.10.3.0:/usr/lib/aarch64-linux-gnu/libnvinfer.so.10.3.0:ro
      - /usr/lib/aarch64-linux-gnu/libnvonnxparser.so.10:/usr/lib/aarch64-linux-gnu/libnvonnxparser.so.10:ro

volumes: {}
