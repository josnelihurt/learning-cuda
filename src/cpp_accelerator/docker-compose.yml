services:
  accelerator-client:
    image: "${ACCELERATOR_IMAGE:?ACCELERATOR_IMAGE is not set, provide versioned tag cpp-accelerator-X.Y.Z-protoA.B.C-arm64}"
    container_name: cuda-accelerator-client
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "60060:60060/tcp"  # WebRTC TCP fallback for clients behind UDP-blocking firewalls
      - "10000-10199:10000-10199/udp"  # WebRTC ICE candidates

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/local/cuda-12.6/targets/aarch64-linux/lib:/usr/local/lib:/usr/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH
      - OTEL_LOGS_ENABLED=false
      - OTEL_LOGS_ENDPOINT=https://otel-cuda-demo.josnelihurt.me/v1/logs
      - OTEL_ENVIRONMENT=production
      - WEBRTC_PUBLIC_IP=73.71.7.90
      - WEBRTC_PUBLIC_PORT=10000
      - WEBRTC_PUBLIC_TCP_PORT=60060

    command:
      - accelerator_control_client
      - --control_addr=vultur.josnelihurt.me:60062
      - --device_id=${ACCELERATOR_DEVICE_ID:-jetson-prod-01}
      - --display_name=${ACCELERATOR_DISPLAY_NAME:-Jetson Orin}
      - --client_cert=/secrets/client.pem
      - --client_key=/secrets/client-key.pem
      - --ca_cert=/secrets/ca.pem

    # Camera device pass-through for Jetson Argus camera framework.
    # nvarguscamerasrc requires access to Tegra platform devices in addition to
    # the V4L2 video nodes.  The exact set depends on JetPack version; this
    # covers JetPack 6 / R36.
    devices:
      - /dev/video0:/dev/video0   # CAM0 — IMX477
      - /dev/video1:/dev/video1   # CAM1 — IMX519
      - /dev/v4l-subdev0:/dev/v4l-subdev0
      - /dev/v4l-subdev1:/dev/v4l-subdev1
      - /dev/v4l-subdev2:/dev/v4l-subdev2
      - /dev/v4l-subdev3:/dev/v4l-subdev3
      - /dev/media0:/dev/media0
      - /dev/nvhost-ctrl-gpu:/dev/nvhost-ctrl-gpu
      - /dev/nvhost-ctrl-isp:/dev/nvhost-ctrl-isp
      - /dev/nvhost-ctrl-isp-thi:/dev/nvhost-ctrl-isp-thi
      - /dev/nvhost-ctrl-nvcsi:/dev/nvhost-ctrl-nvcsi
      - /dev/nvhost-ctrl-vi0:/dev/nvhost-ctrl-vi0
      - /dev/nvhost-ctrl-vi0-thi:/dev/nvhost-ctrl-vi0-thi
      - /dev/nvhost-ctrl-vi1:/dev/nvhost-ctrl-vi1
      - /dev/nvhost-ctrl-vi1-thi:/dev/nvhost-ctrl-vi1-thi
      - /dev/nvhost-nvsched_ctrl_fifo-gpu:/dev/nvhost-nvsched_ctrl_fifo-gpu
      - /dev/nvmap:/dev/nvmap
      - /dev/nvgpu:/dev/nvgpu

    volumes:
      - ${ACCELERATOR_SECRETS_DIR:-./secrets}:/secrets:ro
      - ${ACCELERATOR_LOGS_DIR:-./logs}:/tmp:rw
      - /tmp/argus_socket:/tmp/argus_socket
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1:ro
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so:ro
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1.0.0:/usr/local/cuda-12.6/targets/aarch64-linux/lib/libcudla.so.1.0.0:ro
      - /usr/lib/aarch64-linux-gnu/libnvinfer.so.10:/usr/lib/aarch64-linux-gnu/libnvinfer.so.10:ro
      - /usr/lib/aarch64-linux-gnu/libnvinfer.so.10.3.0:/usr/lib/aarch64-linux-gnu/libnvinfer.so.10.3.0:ro
      - /usr/lib/aarch64-linux-gnu/libnvinfer_builder_resource.so.10.3.0:/usr/lib/aarch64-linux-gnu/libnvinfer_builder_resource.so.10.3.0:ro
      - /usr/lib/aarch64-linux-gnu/libnvonnxparser.so.10:/usr/lib/aarch64-linux-gnu/libnvonnxparser.so.10:ro
      - ${ACCELERATOR_MODELS_DIR:-./models}:/opt/cuda/grpc/data/models:rw

volumes: {}
