environment: "development"

server:
  http_port: ":8080"
  https_port: ":8443"
  tls:
    enabled: true
    cert_file: ".secrets/localhost+2.pem"
    key_file: ".secrets/localhost+2-key.pem"

stream:
  transport_format: "json"
  websocket_endpoint: "/ws"

go_feature_flag:
  enabled: true
  file_path: "config/flags.goff.yaml"
  namespace: "default"

observability:
  service_name: "cuda-image-processor"
  service_version: "1.0.0"
  otel_collector_grpc_endpoint: "localhost:4317"
  otel_collector_http_endpoint: "http://localhost:4318"
  trace_sampling_rate: 1.0

logging:
  level: "info"
  format: "json"
  output: "stdout"
  include_caller: true

processor:
  library_base_path: ".ignore/lib/cuda_learning"
  default_library: "2.1.0"
  enable_hot_reload: false
  fallback_enabled: false
  fallback_chain:
    - "2.1.0"

static_images:
  directory: "data/static_images"

tools:
  observability:
    - id: "jaeger"
      name: "Jaeger Tracing"
      icon_path: "/static/img/tools/jaeger.svg"
      type: "url"
      url_dev: "http://localhost:16686"
      url_prod: "https://jaeger.production.example.com"
    - id: "grafana_logs"
      name: "Logs Dashboard"
      icon_path: "/static/img/tools/grafana.svg"
      type: "url"
      url_dev: "http://localhost:3001/d/cuda-multi-layer-logs"
      url_prod: "/grafana/d/cuda-multi-layer-logs"
    - id: "grafana_explore"
      name: "Grafana Explore"
      icon_path: "/static/img/tools/grafana.svg"
      type: "url"
      url_dev: "http://localhost:3001/explore"
      url_prod: "/grafana/explore"
  features:
    - id: "feature_flags"
      name: "Feature Flags"
      icon_path: ""
      type: "action"
      action: "open_feature_flags"
  testing:
    - id: "bdd_reports"
      name: "Test Reports (BDD)"
      icon_path: ""
      type: "url"
      url_dev: "http://localhost:5050"
      url_prod: "/reports"
    - id: "e2e_reports"
      name: "E2E Test Results (Playwright)"
      icon_path: "/static/img/tools/playwright.svg"
      type: "url"
      url_dev: "http://localhost:5051"
      url_prod: "/e2e"
    - id: "coverage_reports"
      name: "Code Coverage"
      icon_path: ""
      type: "url"
      url_dev: "http://localhost:5052"
      url_prod: "/coverage"
